<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movilidad de Ventanilla - Registro</title>
    <style>
        :root {
            --soft-blue: #e0eafc;
            --main-gradient: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            --glass: rgba(255, 255, 255, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
            user-select: none; /* Evita selección de texto */
        }

        body {
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            perspective: 1000px;
        }

        /* Fondo animado suave */
        .bg-circles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(120deg, #e0f2fe 0%, #f0f9ff 100%);
        }

        .circle {
            position: absolute;
            background: rgba(37, 117, 252, 0.1);
            border-radius: 50%;
            animation: float 15s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-50px) rotate(20deg); }
        }

        /* Contenedor 3D Estilo Glassmorphism */
        .card-3d {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 95%;
            max-width: 500px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }

        .card-3d:hover {
            transform: rotateX(2deg) rotateY(-2deg);
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 { font-size: 1.4rem; color: #1e3a8a; margin-bottom: 10px; }
        .info-box {
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            font-size: 0.85rem;
            color: #475569;
            border-left: 5px solid #2575fc;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
            transform: translateZ(20px);
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: #334155;
            margin-bottom: 5px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            outline: none;
            transition: 0.3s;
            background: #ffffff;
        }

        input:focus {
            border-color: #2575fc;
            box-shadow: 0 0 10px rgba(37, 117, 252, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: var(--main-gradient);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(37, 117, 252, 0.2);
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        footer {
            margin-top: 20px;
            font-size: 0.75rem;
            color: #64748b;
            text-align: center;
            line-height: 1.4;
        }

        /* Notificación de bloqueo */
        #block-msg {
            position: fixed;
            bottom: 20px;
            background: #ef4444;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            display: none;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div class="bg-circles">
        <div class="circle" style="width:100px; height:100px; top:10%; left:10%;"></div>
        <div class="circle" style="width:150px; height:150px; bottom:10%; right:10%;"></div>
    </div>

    <div id="block-msg">Acción bloqueada para garantizar transparencia.</div>

    <div class="card-3d">
        <header>
            <h1>🚌 MOVILIDAD DE VENTANILLA 🚌</h1>
            <div class="info-box">
                ‼️ LES MANDO MI SALUDO A TODOS USTEDES ‼️<br>
                Plazo para rellenar: <b>10 MINUTOS</b>.<br>
                Capacidad: 40 personas.
            </div>
        </header>

        <!-- PEGA TU URL DE APPS SCRIPT AQUÍ -->
        <form id="formVentanilla" action="TU_URL_DE_APPS_SCRIPT_AQUI" method="POST">
            
            <div class="input-group">
                <label>Nombres: (MÍNIMO 1 NOMBRE) *</label>
                <input type="text" name="nombres" required autocomplete="off" onpaste="return false;" ondrop="return false;">
            </div>

            <div class="input-group">
                <label>Apellidos: (SON 2 APELLIDOS) *</label>
                <input type="text" name="apellidos" required autocomplete="off" onpaste="return false;">
            </div>

            <div class="input-group">
                <label>CÓDIGO DE ESTUDIANTE *</label>
                <input type="text" name="codigo" required autocomplete="off" onpaste="return false;">
            </div>

            <div class="input-group">
                <label>FACULTAD: *</label>
                <select name="facultad" required>
                    <option value="">Seleccione...</option>
                    <option value="FCC">FCC</option>
                    <option value="FCA">FCA</option>
                    <option value="FCE">FCE</option>
                    <option value="FIARN">FIARN</option>
                    <option value="FIQ">FIQ</option>
                    <option value="FCS">FCS</option>
                    <option value="FCED">FCED</option>
                    <option value="FIIS">FIIS</option>
                    <option value="FIME">FIME</option>
                    <option value="FIPA">FIPA</option>
                    <option value="FCNM">FCNM</option>
                    <option value="FIEE">FIEE</option>
                </select>
            </div>

            <div class="input-group">
                <label>DNI: *</label>
                <input type="text" name="dni" maxlength="8" required autocomplete="off" onpaste="return false;">
            </div>

            <button type="submit" class="btn-submit" id="btnEnvio">ENVIAR REGISTRO</button>
        </form>

        <footer>
            Estimados, el número de lista será enviado a su correo institucional. 
            ¡Sigamos mejorando! 🚀<br>
            <b>ATT. DELEGADO 🫡</b>
        </footer>
    </div>

    <script>
        const form = document.getElementById('formVentanilla');
        const blockMsg = document.getElementById('block-msg');

        // BLOQUEOS DE SEGURIDAD
        function showBlock() {
            blockMsg.style.display = 'block';
            setTimeout(() => blockMsg.style.display = 'none', 2000);
        }

        // Bloquear clic derecho
        document.addEventListener('contextmenu', e => {
            e.preventDefault();
            showBlock();
        });

        // Bloquear atajos de teclado (Ctrl+C, Ctrl+V, Ctrl+U, F12)
        document.addEventListener('keydown', e => {
            if (e.ctrlKey || e.keyCode === 123) {
                e.preventDefault();
                showBlock();
            }
        });

        // Envío de datos por AJAX (Sin recargar)
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnEnvio');
            btn.innerText = "ENVIANDO...";
            btn.disabled = true;

            const formData = new FormData(form);
            fetch(form.action, {
                method: 'POST',
                body: formData,
                mode: 'no-cors'
            }).then(() => {
                alert("✅ Registro exitoso. Tu puesto ha sido reservado.");
                form.reset();
                btn.innerText = "ENVIAR REGISTRO";
                btn.disabled = false;
            }).catch(() => {
                alert("Error al conectar con el servidor.");
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
