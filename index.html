<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movilidad Ventanilla | Registro Oficial</title>
    <style>
        :root {
            --primary: #2563eb;
            --glass: rgba(255, 255, 255, 0.7);
            --border: rgba(255, 255, 255, 0.4);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
            user-select: none; /* Bloqueo total de selección */
        }

        body {
            background: linear-gradient(135deg, #e0e7ff 0%, #f1f5f9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 2000px;
        }

        /* Fondo Animado 3D */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: move 20s infinite alternate;
        }
        .orb-1 { width: 400px; height: 400px; background: rgba(37, 99, 235, 0.2); top: -10%; left: -10%; }
        .orb-2 { width: 300px; height: 300px; background: rgba(168, 85, 247, 0.2); bottom: -10%; right: -10%; }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(100px, 50px) scale(1.2); }
        }

        /* Contenedor Principal 3D */
        .container-3d {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            transform-style: preserve-3d;
            animation: entry 1.2s ease-out;
        }

        @keyframes entry {
            0% { opacity: 0; transform: translateZ(-500px) rotateX(20deg); }
            100% { opacity: 1; transform: translateZ(0) rotateX(0); }
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid var(--border);
            padding: 35px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            transform: rotateX(5deg) rotateY(-5deg);
            transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .glass-card:hover {
            transform: rotateX(0deg) rotateY(0deg) translateY(-5px);
            box-shadow: 0 35px 60px -12px rgba(0, 0, 0, 0.15);
        }

        header { text-align: center; margin-bottom: 25px; }
        h1 { color: #1e293b; font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px; }
        
        .status-badge {
            background: #fff;
            padding: 8px 15px;
            border-radius: 12px;
            font-size: 0.75rem;
            color: #475569;
            margin-top: 15px;
            border: 1px solid #e2e8f0;
            display: inline-block;
        }

        .form-section { margin-bottom: 18px; }
        label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            color: #64748b;
            margin-bottom: 6px;
            text-transform: uppercase;
            padding-left: 5px;
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.6);
            border: 1.5px solid #e2e8f0;
            border-radius: 14px;
            font-size: 0.95rem;
            color: #1e293b;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            background: #fff;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        /* Botón 3D */
        .btn-push {
            width: 100%;
            padding: 16px;
            background: #1e293b;
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            box-shadow: 0 4px 0 #000;
        }

        .btn-push:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #000;
        }

        .btn-push:hover:not(:disabled) {
            background: var(--primary);
        }

        footer {
            margin-top: 25px;
            text-align: center;
            font-size: 0.7rem;
            color: #94a3b8;
            line-height: 1.5;
        }

        /* Bloqueo Visual */
        .no-copy {
            pointer-events: all;
        }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container-3d">
        <div class="glass-card">
            <header>
                <h1>🚌 MOVILIDAD VENTANILLA</h1>
                <div class="status-badge">
                    ⚡ SISTEMA ANTI-AUTOFILL ACTIVO
                </div>
            </header>

            <form id="proForm" action="TU_URL_DE_APPS_SCRIPT_AQUI" method="POST">
                
                <div class="form-section">
                    <label>Nombres (Mínimo 1)</label>
                    <input type="text" name="nombres" class="secure-input" 
                           placeholder="Escriba manualmente..." required>
                </div>

                <div class="form-section">
                    <label>Apellidos (2 Apellidos)</label>
                    <input type="text" name="apellidos" class="secure-input" 
                           placeholder="Escriba manualmente..." required>
                </div>

                <div class="form-section">
                    <label>Código de Estudiante</label>
                    <input type="text" name="codigo" class="secure-input" 
                           placeholder="Código oficial..." required>
                </div>

                <div class="form-section">
                    <label>Facultad</label>
                    <select name="facultad" required>
                        <option value="" disabled selected>Seleccione...</option>
                        <option>FCC</option><option>FCA</option><option>FCE</option>
                        <option>FIARN</option><option>FIQ</option><option>FCS</option>
                        <option>FCED</option><option>FIIS</option><option>FIME</option>
                        <option>FIPA</option><option>FCNM</option><option>FIEE</option>
                    </select>
                </div>

                <div class="form-section">
                    <label>DNI</label>
                    <input type="text" name="dni" class="secure-input" 
                           maxlength="8" placeholder="8 dígitos" required>
                </div>

                <button type="submit" class="btn-push" id="btnSubmit">REGISTRAR AHORA</button>
            </form>

            <footer>
                <b>⚠️ ADVERTENCIA:</b> Para garantizar la equidad, el pegado y autocompletado están bloqueados. Debe digitar sus datos.<br><br>
                <b>ATT. DELEGADO 🫡</b>
            </footer>
        </div>
    </div>

    <script>
        const form = document.getElementById('proForm');
        const inputs = document.querySelectorAll('.secure-input');

        // --- BLOQUEO NIVEL DIOS ---

        inputs.forEach(input => {
            // 1. Bloquear Pegado
            input.addEventListener('paste', e => {
                e.preventDefault();
                alert("❌ Pegado bloqueado. Escribe manualmente.");
            });

            // 2. Bloquear Drop (arrastrar texto)
            input.addEventListener('drop', e => e.preventDefault());

            // 3. BLOQUEO TOTAL DE AUTOCOMPLETADO
            // Ponemos el campo en readonly y solo se activa si hay un click humano
            input.setAttribute('readonly', 'readonly');
            input.addEventListener('mousedown', () => {
                input.removeAttribute('readonly');
            });

            // 4. VERIFICACIÓN DE PULSACIÓN REAL
            // Si el valor cambia pero no fue por una tecla, lo borramos.
            let isKeyTyped = false;
            input.addEventListener('keydown', () => isKeyTyped = true);
            
            input.addEventListener('input', (e) => {
                if (!isKeyTyped) {
                    input.value = ''; // Borra autocompletado instantáneamente
                }
                isKeyTyped = false;
            });
        });

        // 5. Bloquear Clic Derecho y Atajos
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && (e.key === 'v' || e.key === 'c' || e.key === 'u' || e.key === 's')) {
                e.preventDefault();
            }
        });

        // Envío AJAX
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.innerText = "PROCESANDO...";
            btn.disabled = true;

            fetch(form.action, {
                method: 'POST',
                body: new FormData(form),
                mode: 'no-cors'
            }).then(() => {
                alert("✅ REGISTRO CORRECTO. Tus datos están en el Excel.");
                form.reset();
                btn.innerText = "REGISTRAR AHORA";
                btn.disabled = false;
            }).catch(() => {
                alert("Error de conexión");
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
