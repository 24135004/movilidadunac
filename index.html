<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE VALIDACIÓN - RUTA VENTANILLA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --bg-dark: #020205;
            --card-bg: rgba(5, 5, 15, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Grotesk', sans-serif; }

        body {
            background-color: var(--bg-dark);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #e0e0ff;
        }

        /* CONTENEDOR DEL MUNDO 3D (SIEMPRE AL FONDO) */
        #canvas-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; /* Al fondo */
        }

        /* PANTALLA DE BLOQUEO (TRANSPARENTE PARA VER EL GLOBO) */
        #lock-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle, rgba(2,2,5,0.2) 0%, rgba(2,2,5,0.8) 100%);
            backdrop-filter: blur(2px); /* Un ligero desenfoque para que resalte el texto */
        }

        .timer-display {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(3rem, 10vw, 6rem);
            color: var(--neon-blue);
            text-shadow: 0 0 30px var(--neon-blue);
            margin: 20px 0;
        }

        #main-container {
            position: relative;
            z-index: 200;
            width: 90%;
            max-width: 450px;
            display: none; /* Se activa al terminar el tiempo */
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            padding: 35px;
            border-radius: 20px;
            border: 1px solid rgba(0, 242, 255, 0.3);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        h2 { font-family: 'Syncopate', sans-serif; font-size: 1rem; color: var(--neon-blue); margin-bottom: 25px; }

        .option-btn {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            text-align: left;
            transition: 0.3s;
        }

        .option-btn:hover {
            background: rgba(0, 242, 255, 0.15);
            border-color: var(--neon-blue);
            transform: translateX(10px);
        }

        .step { display: none; }
        .step.active { display: block; }

        .final-link {
            display: block;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            color: white;
            text-decoration: none;
            text-align: center;
            padding: 18px;
            border-radius: 10px;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <!-- CRONÓMETRO (Visible al inicio) -->
    <div id="lock-screen">
        <p style="letter-spacing: 5px; color: white; opacity: 0.8;">SISTEMA DE ACCESO</p>
        <div class="timer-display" id="countdown">00:00:00</div>
        <p style="color: var(--neon-blue); font-weight: bold;">AGUARDE A LA HORA DE APERTURA</p>
    </div>

    <!-- CUESTIONARIO (Oculto hasta que el tiempo termine) -->
    <div id="main-container">
        <div class="card">
            <div class="step active" id="step1">
                <h2>1. ¿Destino de la unidad?</h2>
                <button class="option-btn" onclick="next(2)">VENTANILLA</button>
                <button class="option-btn" onclick="fail()">CENTRO DE LIMA</button>
            </div>
            <div class="step" id="step2">
                <h2>2. ¿Correo institucional?</h2>
                <button class="option-btn" onclick="next(3)">@TECSUP.EDU.PE</button>
                <button class="option-btn" onclick="fail()">@GMAIL.COM</button>
            </div>
            <div id="success-step" style="display:none; text-align:center;">
                <h2 style="color: #00ff88;">✓ ACCESO VALIDADO</h2>
                <p>Ya puedes registrar tu asistencia en el formulario oficial.</p>
                <a href="https://forms.gle/WaVSftiLKBydPo5K8" class="final-link">IR AL FORMULARIO</a>
            </div>
        </div>
    </div>

    <script>
        // ======================================================
        // 1. CONFIGURACIÓN DE LA HORA (MODIFICA AQUÍ)
        // ======================================================
        const HORA_APERTURA = 11;   // Hora (en formato 24h, ej: 17 es 5 PM)
        const MINUTO_APERTURA = 53;  // Minuto
        // ======================================================

        function updateTimer() {
            const now = new Date();
            const target = new Date();
            target.setHours(HORA_APERTURA, MINUTO_APERTURA, 0);

            const diff = target - now;

            if (diff <= 0) {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('main-container').style.display = 'block';
                return;
            }

            const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
            const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
            const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            document.getElementById('countdown').innerText = `${h}:${m}:${s}`;
        }
        setInterval(updateTimer, 1000);
        updateTimer();

        // ======================================================
        // 2. GLOBO TERRÁQUEO TECNOLÓGICO 3D
        // ======================================================
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const globeGroup = new THREE.Group();
        scene.add(globeGroup);

        // Esfera de Red (Wireframe)
        const sphereGeo = new THREE.IcosahedronGeometry(2, 2);
        const sphereMat = new THREE.MeshBasicMaterial({ 
            color: 0x00f2ff, wireframe: true, transparent: true, opacity: 0.3 
        });
        const globe = new THREE.Mesh(sphereGeo, sphereMat);
        globeGroup.add(globe);

        // Nube de puntos (Nodos de datos)
        const dotsGeo = new THREE.SphereGeometry(2.1, 35, 35);
        const dotsMat = new THREE.PointsMaterial({ size: 0.04, color: 0xbc13fe, transparent: true, opacity: 0.8 });
        const dots = new THREE.Points(dotsGeo, dotsMat);
        globeGroup.add(dots);

        // Anillo de escaneo
        const ringGeo = new THREE.TorusGeometry(2.5, 0.02, 16, 100);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0x00f2ff, transparent: true, opacity: 0.5 });
        const scanRing = new THREE.Mesh(ringGeo, ringMat);
        scanRing.rotation.x = Math.PI / 2;
        globeGroup.add(scanRing);

        camera.position.z = 5;

        function animate() {
            requestAnimationFrame(animate);
            globeGroup.rotation.y += 0.003;
            dots.rotation.y -= 0.001;
            scanRing.position.y = Math.sin(Date.now() * 0.002) * 1.5; // El anillo sube y baja
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ======================================================
        // 3. LÓGICA DEL CUESTIONARIO
        // ======================================================
        function next(stepId) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + stepId).classList.add('active');
        }

        function fail() {
            alert("ERROR DE VALIDACIÓN: El sistema se reiniciará.");
            location.reload();
        }

        function finishQuiz() {
            document.querySelectorAll('.step').forEach(s => s.style.display = 'none');
            document.getElementById('success-step').style.display = 'block';
        }
        // Ajuste para el último botón
        document.querySelector('#step2 .option-btn').onclick = function() {
            document.getElementById('step2').classList.remove('active');
            document.getElementById('success-step').style.display = 'block';
        };

    </script>
</body>
</html>
