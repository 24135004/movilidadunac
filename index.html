<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movilidad Ventanilla - Oficial</title>
    <style>
        :root {
            --soft-blue: #f0f4f8;
            --accent: #3b82f6;
            --glass: rgba(255, 255, 255, 0.9);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
            user-select: none; /* Bloquea selección de texto */
            -webkit-user-drag: none;
        }

        body {
            background: #e2e8f0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px;
            overflow: hidden;
        }

        /* Fondo Animado Sutil */
        .bg-gradient {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #ffffff 0%, #cbd5e1 100%);
            z-index: -1;
        }

        /* Contenedor 3D Suave */
        .card-3d {
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 450px;
            border: 1px solid white;
            transform: rotateX(5deg);
            transition: 0.5s ease;
        }

        .card-3d:hover {
            transform: rotateX(0deg) translateY(-5px);
        }

        header { text-align: center; margin-bottom: 20px; }
        h1 { color: #1e293b; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; }
        
        .alert-box {
            background: #fff;
            border-left: 4px solid var(--accent);
            padding: 10px;
            margin: 15px 0;
            font-size: 0.8rem;
            color: #475569;
            border-radius: 5px;
        }

        .input-field {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: bold;
            color: #64748b;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            outline: none;
            background: #f8fafc;
            font-size: 1rem;
            transition: 0.3s;
            /* Cursor de texto para simular que es normal */
            cursor: text;
        }

        /* Cambiar color cuando el script quita el readonly */
        input:focus:not([readonly]) {
            border-color: var(--accent);
            background: white;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.1);
        }

        .btn-send {
            width: 100%;
            padding: 15px;
            background: #1e293b;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-send:hover {
            background: var(--accent);
            transform: scale(1.02);
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 20px;
        }

    </style>
</head>
<body>

    <div class="bg-gradient"></div>

    <div class="card-3d">
        <header>
            <h1>🚌 MOVILIDAD VENTANILLA</h1>
            <div class="alert-box">
                <b>AVISO:</b> Autocompletado y Pegado DESACTIVADOS. <br>
                Escriba manualmente para validar su identidad.
            </div>
        </header>

        <!-- SUSTITUIR POR TU URL DE GOOGLE APPS SCRIPT -->
        <form id="secureForm" action="TU_URL_DE_APPS_SCRIPT_AQUI" method="POST">
            
            <div class="input-field">
                <label>Nombres Completos</label>
                <input type="text" name="nombres" id="n_1" 
                    placeholder="Escriba aquí..."
                    readonly onfocus="this.removeAttribute('readonly');"
                    autocomplete="off" required>
            </div>

            <div class="input-field">
                <label>Apellidos (Ambos)</label>
                <input type="text" name="apellidos" id="a_2" 
                    placeholder="Escriba aquí..."
                    readonly onfocus="this.removeAttribute('readonly');"
                    autocomplete="off" required>
            </div>

            <div class="input-field">
                <label>Código de Estudiante</label>
                <input type="text" name="codigo" id="c_3" 
                    placeholder="Escriba aquí..."
                    readonly onfocus="this.removeAttribute('readonly');"
                    autocomplete="off" required>
            </div>

            <div class="input-field">
                <label>Facultad</label>
                <select name="facultad" required>
                    <option value="" disabled selected>Seleccione su facultad</option>
                    <option value="FCC">FCC</option><option value="FCA">FCA</option>
                    <option value="FCE">FCE</option><option value="FIARN">FIARN</option>
                    <option value="FIQ">FIQ</option><option value="FCS">FCS</option>
                    <option value="FCED">FCED</option><option value="FIIS">FIIS</option>
                    <option value="FIME">FIME</option><option value="FIPA">FIPA</option>
                    <option value="FCNM">FCNM</option><option value="FIEE">FIEE</option>
                </select>
            </div>

            <div class="input-field">
                <label>DNI / Documento</label>
                <input type="text" name="dni" id="d_4" 
                    maxlength="8" placeholder="8 dígitos"
                    readonly onfocus="this.removeAttribute('readonly');"
                    autocomplete="off" required>
            </div>

            <button type="submit" class="btn-send" id="btnSubmit">ENVIAR DATOS</button>
        </form>

        <footer>
            <b>ATT: DELEGADO</b><br>
            El sistema detectará registros automáticos.
        </footer>
    </div>

    <script>
        const form = document.getElementById('secureForm');

        // 1. BLOQUEO DE PEGADO (PASTE) EN TODOS LOS CAMPOS
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('paste', e => e.preventDefault());
            input.addEventListener('drop', e => e.preventDefault());
            
            // 2. DETECTOR DE AUTOCOMPLETADO
            // Si el valor cambia sin que haya una tecla presionada, lo borramos
            input.addEventListener('input', function(e) {
                if (e.inputType === 'insertFromPaste' || e.inputType === undefined) {
                    this.value = '';
                }
            });
        });

        // 3. BLOQUEO DE CLICK DERECHO Y TECLAS DE ATAJO
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && (e.key === 'c' || e.key === 'v' || e.key === 'u' || e.key === 'j' || e.key === 's')) {
                e.preventDefault();
                alert("Acción bloqueada. Debe escribir manualmente.");
            }
            if (e.key === "F12") e.preventDefault();
        });

        // 4. ENVÍO SEGURO
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.innerText = "VERIFICANDO...";
            btn.disabled = true;

            const formData = new FormData(form);
            fetch(form.action, {
                method: 'POST',
                body: formData,
                mode: 'no-cors'
            }).then(() => {
                alert("¡REGISTRO COMPLETADO EXITOSAMENTE!");
                form.reset();
                btn.innerText = "ENVIAR DATOS";
                btn.disabled = false;
            }).catch(() => {
                alert("Error de conexión.");
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
